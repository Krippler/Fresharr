services:
  fresharr:
    image: ghcr.io/krippler/fresharr:latest
    container_name: fresharr
    restart: unless-stopped
    ports:
      - "8383:8383"                      # web interface - all settings live there
    environment:
      DRY_RUN: "true"                    # start in dry-run; flip to false once happy
      # Everything else (Radarr/Sonarr connections, API keys, thresholds,
      # languages, schedule) is configured in the web UI at http://<host>:8383.
      # Env vars still work as defaults if you prefer them, e.g.:
      # RADARR_URL: http://radarr:7878
      # RADARR_API_KEY: your-radarr-api-key
      # SONARR_URL: http://sonarr:8989
      # SONARR_API_KEY: your-sonarr-api-key
      # TMDB_API_KEY: your-tmdb-api-key
      # TRAKT_CLIENT_ID: your-client-id
    volumes:
      - ./config:/config
